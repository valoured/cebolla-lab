name: Cebolla — Daily Data Pulls

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 14 * * *'
    - cron: '0 22 * * *'
    - cron: '0 17 * * *'
    - cron: '0 18 * * *'
    - cron: '0 19 * * *'
    - cron: '0 20 * * *'
    - cron: '0 21 * * *'
    - cron: '0 23 * * *'
    - cron: '0 0 * * *'
    - cron: '0 1 * * *'
    - cron: '0 2 * * *'
    - cron: '0 3 * * *'

  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'all'
        type: choice
        options: [all, schedule, savant, arsenals, pitcher_stats, weather, dk_odds, lineups, projections]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  pull-schedule:
    if: |
      (github.event_name == 'schedule' &&
       (github.event.schedule == '0 6 * * *' ||
        github.event.schedule == '0 14 * * *' ||
        github.event.schedule == '0 22 * * *'))
      || inputs.job == 'all' || inputs.job == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_schedule.py

  pull-savant:
    if: |
      (github.event_name == 'schedule' &&
       (github.event.schedule == '0 6 * * *' ||
        github.event.schedule == '0 22 * * *'))
      || inputs.job == 'all' || inputs.job == 'savant'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_savant.py

  pull-arsenals:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *')
      || inputs.job == 'all' || inputs.job == 'arsenals'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_arsenals.py

  # NEW in v0.1.2: pitcher season stats (HR/9, K/9, BF, IP, etc.) from MLB Stats API
  pull-pitcher-stats:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *')
      || inputs.job == 'all' || inputs.job == 'pitcher_stats'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_pitcher_stats.py

  pull-weather:
    if: |
      (github.event_name == 'schedule' &&
       (github.event.schedule == '0 6 * * *' ||
        github.event.schedule == '0 14 * * *' ||
        github.event.schedule == '0 22 * * *'))
      || inputs.job == 'all' || inputs.job == 'weather'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_weather.py

  pull-lineups:
    if: |
      (github.event_name == 'schedule' &&
       contains(fromJSON('["0 14 * * *", "0 17 * * *", "0 18 * * *", "0 19 * * *", "0 20 * * *", "0 21 * * *", "0 22 * * *", "0 23 * * *", "0 0 * * *", "0 1 * * *", "0 2 * * *"]'), github.event.schedule))
      || inputs.job == 'all' || inputs.job == 'lineups'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_lineups.py

  pull-dk-odds:
    if: |
      (github.event_name == 'schedule' &&
       contains(fromJSON('["0 17 * * *", "0 18 * * *", "0 19 * * *", "0 20 * * *", "0 21 * * *", "0 22 * * *", "0 23 * * *", "0 0 * * *", "0 1 * * *", "0 2 * * *", "0 3 * * *"]'), github.event.schedule))
      || inputs.job == 'all' || inputs.job == 'dk_odds'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_dk_odds.py

  compute-projections:
    if: |
      (github.event_name == 'schedule' &&
       contains(fromJSON('["0 17 * * *", "0 18 * * *", "0 19 * * *", "0 20 * * *", "0 21 * * *", "0 22 * * *", "0 23 * * *", "0 0 * * *", "0 1 * * *", "0 2 * * *"]'), github.event.schedule))
      || inputs.job == 'all' || inputs.job == 'projections'
    runs-on: ubuntu-latest
    needs: [pull-dk-odds, pull-lineups]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/compute_projections.py
