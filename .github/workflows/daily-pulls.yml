name: Cebolla — Daily Data Pulls

on:
  schedule:
    # All times UTC. ET = UTC - 4 (DST) or UTC - 5 (standard).
    # Schedule pull: keep frequent for lineup updates
    - cron: '0 6 * * *'      # 06:00 UTC (02:00 ET) — overnight prep
    - cron: '0 14 * * *'     # 14:00 UTC (10:00 ET) — mid-morning
    - cron: '0 22 * * *'     # 22:00 UTC (18:00 ET) — pre-game
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'all'
        type: choice
        options: [all, schedule, savant, arsenals, weather]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ─────────────────────────────────────────────
  # 1. Schedule + probable pitchers (3x daily)
  # ─────────────────────────────────────────────
  pull-schedule:
    if: github.event_name == 'schedule' || inputs.job == 'all' || inputs.job == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install deps
        run: pip install -r scripts/requirements.txt
      - name: Pull schedule
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_schedule.py

  # ─────────────────────────────────────────────
  # 2. Savant / FanGraphs stats (twice daily, after schedule)
  #    Schedule via GH cron in second workflow OR triggered after schedule
  # ─────────────────────────────────────────────
  pull-savant:
    if: |
      (github.event_name == 'schedule' && (github.event.schedule == '0 6 * * *' || github.event.schedule == '0 22 * * *'))
      || inputs.job == 'all' || inputs.job == 'savant'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install deps
        run: pip install -r scripts/requirements.txt
      - name: Pull FanGraphs/Savant stats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_savant.py

  # ─────────────────────────────────────────────
  # 3. Pitcher arsenals (once daily, runs after schedule)
  #    Statcast pitch-level data; refreshes for upcoming probable pitchers
  # ─────────────────────────────────────────────
  pull-arsenals:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *')
      || inputs.job == 'all' || inputs.job == 'arsenals'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install deps
        run: pip install -r scripts/requirements.txt
      - name: Pull pitcher arsenals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_arsenals.py

  # ─────────────────────────────────────────────
  # 4. Weather (runs every schedule pull, fresh forecast)
  # ─────────────────────────────────────────────
  pull-weather:
    if: github.event_name == 'schedule' || inputs.job == 'all' || inputs.job == 'weather'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install deps
        run: pip install -r scripts/requirements.txt
      - name: Pull weather forecasts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_weather.py
