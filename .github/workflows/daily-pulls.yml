name: Cebolla — Daily Data Pulls

# IMPORTANT: All cron times use minute offsets (not :00) to avoid GitHub's
# top-of-hour load spike, which delays/drops scheduled workflows.
# Times are UTC. EDT = UTC - 4 (summer 2026 = EDT).

on:
  schedule:
    # Overnight + morning heavy jobs
    - cron: '13 6 * * *'   # 06:13 UTC = 2:13 AM ET — schedule, savant, arsenals, pitcher_stats, weather, settle
    - cron: '13 14 * * *'  # 14:13 UTC = 10:13 AM ET — schedule, lineups, weather, settle (East Coast finals)

    # Hourly slate window (15 UTC = 11 AM ET through 03 UTC = 11 PM ET)
    - cron: '17 15 * * *'  # 11:17 AM ET
    - cron: '17 16 * * *'  # 12:17 PM ET
    - cron: '17 17 * * *'  # 1:17 PM ET
    - cron: '17 18 * * *'  # 2:17 PM ET
    - cron: '17 19 * * *'  # 3:17 PM ET
    - cron: '17 20 * * *'  # 4:17 PM ET
    - cron: '17 21 * * *'  # 5:17 PM ET
    - cron: '17 22 * * *'  # 6:17 PM ET
    - cron: '17 23 * * *'  # 7:17 PM ET
    - cron: '17 0 * * *'   # 8:17 PM ET
    - cron: '17 1 * * *'   # 9:17 PM ET
    - cron: '17 2 * * *'   # 10:17 PM ET
    - cron: '17 3 * * *'   # 11:17 PM ET (last odds pull, settle late-night games)

  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'all'
        type: choice
        options: [all, schedule, savant, arsenals, pitcher_stats, batter_counting_stats, weather, dk_odds, lineups, scores, projections, settle_bets]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── SCHEDULE: 3x daily ──
  pull-schedule:
    if: |
      (github.event_name == 'schedule' &&
       contains(fromJSON('["13 6 * * *", "13 14 * * *", "17 22 * * *"]'), github.event.schedule))
      || inputs.job == 'all' || inputs.job == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_schedule.py

  # ── SAVANT: heavy Statcast, 1x daily overnight ──
  pull-savant:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '13 6 * * *')
      || inputs.job == 'all' || inputs.job == 'savant'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_savant.py

  # ── ARSENALS: pitcher pitch-type splits, 1x daily ──
  pull-arsenals:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '13 6 * * *')
      || inputs.job == 'all' || inputs.job == 'arsenals'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_arsenals.py

  # ── PITCHER STATS: clean season stats from MLB API, 1x daily ──
  pull-pitcher-stats:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '13 6 * * *')
      || inputs.job == 'all' || inputs.job == 'pitcher_stats'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_pitcher_stats.py

  # ── BATTER COUNTING STATS: R/RBI per PA from MLB API for HRR model, 1x daily ──
  pull-batter-counting-stats:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '13 6 * * *')
      || inputs.job == 'all' || inputs.job == 'batter_counting_stats'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_batter_counting_stats.py

  # ── WEATHER: 3x daily ──
  pull-weather:
    if: |
      (github.event_name == 'schedule' &&
       contains(fromJSON('["13 6 * * *", "13 14 * * *", "17 20 * * *"]'), github.event.schedule))
      || inputs.job == 'all' || inputs.job == 'weather'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_weather.py

  # ── LINEUPS: every hour during slate window ──
  pull-lineups:
    if: |
      (github.event_name == 'schedule' &&
       contains(fromJSON('["13 14 * * *", "17 15 * * *", "17 16 * * *", "17 17 * * *", "17 18 * * *", "17 19 * * *", "17 20 * * *", "17 21 * * *", "17 22 * * *", "17 23 * * *", "17 0 * * *", "17 1 * * *", "17 2 * * *"]'), github.event.schedule))
      || inputs.job == 'all' || inputs.job == 'lineups'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_lineups.py

  # ── DK ODDS: hourly during slate window ──
  pull-dk-odds:
    if: |
      (github.event_name == 'schedule' &&
       contains(fromJSON('["17 15 * * *", "17 16 * * *", "17 17 * * *", "17 18 * * *", "17 19 * * *", "17 20 * * *", "17 21 * * *", "17 22 * * *", "17 23 * * *", "17 0 * * *", "17 1 * * *", "17 2 * * *", "17 3 * * *"]'), github.event.schedule))
      || inputs.job == 'all' || inputs.job == 'dk_odds'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_dk_odds.py

  # ── SCORES: live scores + inning state, hourly during slate ──
  pull-scores:
    if: |
      (github.event_name == 'schedule' &&
       contains(fromJSON('["13 14 * * *", "17 15 * * *", "17 16 * * *", "17 17 * * *", "17 18 * * *", "17 19 * * *", "17 20 * * *", "17 21 * * *", "17 22 * * *", "17 23 * * *", "17 0 * * *", "17 1 * * *", "17 2 * * *", "17 3 * * *"]'), github.event.schedule))
      || inputs.job == 'all' || inputs.job == 'scores'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_scores.py

  # ── PROJECTIONS: hourly after odds + lineups ──
  compute-projections:
    if: |
      (github.event_name == 'schedule' &&
       contains(fromJSON('["17 15 * * *", "17 16 * * *", "17 17 * * *", "17 18 * * *", "17 19 * * *", "17 20 * * *", "17 21 * * *", "17 22 * * *", "17 23 * * *", "17 0 * * *", "17 1 * * *", "17 2 * * *"]'), github.event.schedule))
      || inputs.job == 'all' || inputs.job == 'projections'
    runs-on: ubuntu-latest
    needs: [pull-dk-odds, pull-lineups]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/compute_projections.py

  # ── SETTLE BETS: post-game grading + overnight catch-up ──
  settle-bets:
    if: |
      (github.event_name == 'schedule' &&
       contains(fromJSON('["17 0 * * *", "17 1 * * *", "17 2 * * *", "17 3 * * *", "13 6 * * *", "13 14 * * *"]'), github.event.schedule))
      || inputs.job == 'all' || inputs.job == 'settle_bets'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/settle_bets.py
