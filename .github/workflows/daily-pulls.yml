name: Cebolla — Daily Data Pulls

# IMPORTANT: All cron times use minute offsets (not :00) to avoid GitHub's
# top-of-hour load spike, which delays/drops scheduled workflows.
# Times are UTC. EDT = UTC - 4 (summer 2026 = EDT).

on:
  schedule:
    # Overnight + morning heavy jobs
    - cron: '13 6 * * *'   # 06:13 UTC = 2:13 AM ET — schedule, savant, arsenals, pitcher_stats, batter_counting_stats, weather, settle

    # ── EARLY POD LOCK ──
    # 06:45 UTC = 2:45 AM ET — locks today's POD picks before any line movement.
    # MLB lineups aren't posted yet at this hour; compute_projections falls back
    # to each team's last-known lineup (~85% accuracy) so projections still run.
    # Chain: lineups (best-effort) → dk_odds → projections → pick_pod
    - cron: '45 6 * * *'

    - cron: '13 14 * * *'  # 14:13 UTC = 10:13 AM ET — schedule, lineups, weather, settle (East Coast finals)

    # ── DENSE PULL_SCORES SCHEDULE (LIVE LIVE UPDATES) ──
    # pull-scores ONLY fires on these crons. Other jobs ignore them.
    # Public repo = unlimited free Actions minutes, so we go full-tilt.
    # Peak slate (2 PM - midnight ET = UTC 18-23 + 0-3): every 5 min
    # Off-peak (midnight ET - 2 PM ET = UTC 4-18): every 15 min
    # Offsets dodge the top-of-hour GitHub load spike.
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 18-23 * * *'  # peak: 2 PM - 7 PM ET, every 5 min
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 0-3 * * *'    # peak: 8 PM - midnight ET, every 5 min
    - cron: '7,22,37,52 4-17 * * *'                          # off-peak: midnight - 1 PM ET, every 15 min

    # Hourly slate window (15 UTC = 11 AM ET through 03 UTC = 11 PM ET)
    # These trigger the FULL slate update chain (odds, lineups, projections, settle).
    # pull-scores ALSO matches these (covered separately via dense schedule above).
    - cron: '17 15 * * *'  # 11:17 AM ET
    - cron: '17 16 * * *'  # 12:17 PM ET
    - cron: '17 17 * * *'  # 1:17 PM ET
    - cron: '17 18 * * *'  # 2:17 PM ET
    - cron: '17 19 * * *'  # 3:17 PM ET
    - cron: '17 20 * * *'  # 4:17 PM ET
    - cron: '17 21 * * *'  # 5:17 PM ET
    - cron: '17 22 * * *'  # 6:17 PM ET
    - cron: '17 23 * * *'  # 7:17 PM ET
    - cron: '17 0 * * *'   # 8:17 PM ET
    - cron: '17 1 * * *'   # 9:17 PM ET
    - cron: '17 2 * * *'   # 10:17 PM ET
    - cron: '17 3 * * *'   # 11:17 PM ET (last odds pull, settle late-night games)

  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'all'
        type: choice
        options: [all, schedule, rosters, savant, arsenals, pitcher_stats, batter_counting_stats, weather, dk_odds, lineups, bvp, scores, projections, pick_pod, pick_cards, settle_bets, settle_pods, settle_cards]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── SCHEDULE: 3x daily ──
  pull-schedule:
    if: |
      (github.event_name == 'schedule' &&
       contains(fromJSON('["13 6 * * *", "13 14 * * *", "17 22 * * *"]'), github.event.schedule))
      || inputs.job == 'all' || inputs.job == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_schedule.py

  # ── ROSTERS: 40-man roster sync for all 30 teams, 1x daily ──
  # Source of truth for players.team_id. Must run before any job that
  # depends on roster membership (e.g. team-page leaderboards).
  pull-rosters:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '13 6 * * *')
      || inputs.job == 'all' || inputs.job == 'rosters'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_rosters.py

  # ── SAVANT: heavy Statcast, 1x daily overnight ──
  pull-savant:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '13 6 * * *')
      || inputs.job == 'all' || inputs.job == 'savant'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_savant.py

  # ── ARSENALS: pitcher pitch-type splits, 1x daily ──
  pull-arsenals:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '13 6 * * *')
      || inputs.job == 'all' || inputs.job == 'arsenals'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_arsenals.py

  # ── PITCHER STATS: clean season stats from MLB API, 1x daily ──
  pull-pitcher-stats:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '13 6 * * *')
      || inputs.job == 'all' || inputs.job == 'pitcher_stats'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_pitcher_stats.py

  # ── WEATHER: 3x daily ──
  pull-weather:
    if: |
      (github.event_name == 'schedule' &&
       contains(fromJSON('["13 6 * * *", "13 14 * * *", "17 20 * * *"]'), github.event.schedule))
      || inputs.job == 'all' || inputs.job == 'weather'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_weather.py

  # ── LINEUPS: every hour during slate window ──
  pull-lineups:
    if: |
      (github.event_name == 'schedule' &&
       contains(fromJSON('["45 6 * * *", "13 14 * * *", "17 15 * * *", "17 16 * * *", "17 17 * * *", "17 18 * * *", "17 19 * * *", "17 20 * * *", "17 21 * * *", "17 22 * * *", "17 23 * * *", "17 0 * * *", "17 1 * * *", "17 2 * * *"]'), github.event.schedule))
      || inputs.job == 'all' || inputs.job == 'lineups'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_lineups.py

  # ── BvP: career batter-vs-pitcher splits ──
  # Runs after lineups so we know which batter/pitcher pairs to fetch.
  # Career stats change slowly — fewer firings than lineups is fine:
  #   - 2:45 AM ET (POD lock chain)
  #   - 17 17 (1:17 PM ET, late-morning lineup confirmations)
  #   - 17 21 (5:17 PM ET, final pre-game lineup updates)
  pull-bvp:
    if: |
      always() && (
        (github.event_name == 'schedule' &&
         contains(fromJSON('["45 6 * * *", "17 17 * * *", "17 21 * * *"]'), github.event.schedule))
        || inputs.job == 'all' || inputs.job == 'bvp'
      )
    runs-on: ubuntu-latest
    needs: pull-lineups
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_bvp.py

  # ── DK ODDS: hourly during slate window + 2:45 AM early-lock pull ──
  pull-dk-odds:
    if: |
      (github.event_name == 'schedule' &&
       contains(fromJSON('["45 6 * * *", "17 15 * * *", "17 16 * * *", "17 17 * * *", "17 18 * * *", "17 19 * * *", "17 20 * * *", "17 21 * * *", "17 22 * * *", "17 23 * * *", "17 0 * * *", "17 1 * * *", "17 2 * * *", "17 3 * * *"]'), github.event.schedule))
      || inputs.job == 'all' || inputs.job == 'dk_odds'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_dk_odds.py

  # ── SCORES: live scores + inning state, dense cadence for LIVE updates ──
  # Peak (2 PM - midnight ET): every 5 min via the comma-list crons.
  # Off-peak (midnight - 1 PM ET): every 15 min via the 7,22,37,52 cron.
  # NOTE: pull-scores does NOT match the legacy 17-minute hourly crons —
  # the dense schedule covers those hours already.
  pull-scores:
    if: |
      (github.event_name == 'schedule' &&
       contains(fromJSON('["2,7,12,17,22,27,32,37,42,47,52,57 18-23 * * *", "2,7,12,17,22,27,32,37,42,47,52,57 0-3 * * *", "7,22,37,52 4-17 * * *", "13 14 * * *"]'), github.event.schedule))
      || inputs.job == 'all' || inputs.job == 'scores'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_scores.py

  # ── PROJECTIONS: hourly after odds + lineups, plus 2:45 AM early-lock ──
  compute-projections:
    if: |
      always() && (
        (github.event_name == 'schedule' &&
         contains(fromJSON('["45 6 * * *", "17 15 * * *", "17 16 * * *", "17 17 * * *", "17 18 * * *", "17 19 * * *", "17 20 * * *", "17 21 * * *", "17 22 * * *", "17 23 * * *", "17 0 * * *", "17 1 * * *", "17 2 * * *"]'), github.event.schedule))
        || inputs.job == 'all' || inputs.job == 'projections'
      )
    runs-on: ubuntu-latest
    needs: [pull-dk-odds, pull-lineups]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/compute_projections.py

  # ── SETTLE BETS: post-game grading + overnight catch-up ──
  settle-bets:
    if: |
      always() && (
        (github.event_name == 'schedule' &&
         contains(fromJSON('["17 0 * * *", "17 1 * * *", "17 2 * * *", "17 3 * * *", "13 6 * * *", "13 14 * * *"]'), github.event.schedule))
        || inputs.job == 'all' || inputs.job == 'settle_bets'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/settle_bets.py

  # ── PICK POD: Cebolla's Play of the Day, 1x daily early-AM ──
  # 06:45 UTC = 2:45 AM ET — locks picks before any line movement.
  # Lineups for tonight's games aren't posted yet at this hour, so
  # compute_projections falls back to each team's last-known lineup
  # (~85% accurate) so projections still produce values.
  pick-pod:
    if: |
      always() && (
        (github.event_name == 'schedule' && github.event.schedule == '45 6 * * *')
        || (github.event_name == 'workflow_dispatch' && inputs.job == 'pick_pod')
      )
    runs-on: ubuntu-latest
    needs: compute-projections
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pick_pod.py

  # ── PICK CARDS: AI-built daily parlays, runs after PODs ──
  # 06:45 UTC = 2:45 AM ET — same window as pick-pod. Real reason for the
  # hour: by 2:45 AM the previous day's late games are Final, the next
  # day's odds have populated, and we lock our picks before any line
  # movement.
  #
  # Why the explicit event_name check (no always()): GitHub Actions has a
  # known issue where `always() && (...)` jobs with `needs:` can fire on
  # cascade-skipped parents at non-matching cron schedules. The bug bit us
  # tonight — pick_cards fired at 12:27 AM ET via the 5-min pull-scores
  # cron path. Replacing always() with explicit event_name + schedule
  # checks blocks the cascade.
  #
  # Why pick_cards is EXCLUDED from inputs.job == 'all': running "all" via
  # manual workflow_dispatch should be safe for data-refresh purposes (pull
  # latest odds, scores, settle, etc.) WITHOUT inadvertently re-picking
  # locked daily cards. Manual re-pick requires explicit inputs.job ==
  # 'pick_cards' — a deliberate action, not a side-effect of "refresh all".
  pick-cards:
    if: |
      always() && (
        (github.event_name == 'schedule' && github.event.schedule == '45 6 * * *')
        || (github.event_name == 'workflow_dispatch' && inputs.job == 'pick_cards')
      )
    runs-on: ubuntu-latest
    needs: pick-pod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pick_cards.py

  # ── SETTLE PODS: grade Plays of the Day, same cadence as settle-bets ──
  settle-pods:
    if: |
      always() && (
        (github.event_name == 'schedule' &&
         contains(fromJSON('["17 0 * * *", "17 1 * * *", "17 2 * * *", "17 3 * * *", "13 6 * * *", "13 14 * * *"]'), github.event.schedule))
        || inputs.job == 'all' || inputs.job == 'settle_pods'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/settle_pods.py

  # ── SETTLE CARDS: grade Cebolla Cards (same cadence as settle-pods) ──
  settle-cards:
    if: |
      always() && (
        (github.event_name == 'schedule' &&
         contains(fromJSON('["17 0 * * *", "17 1 * * *", "17 2 * * *", "17 3 * * *", "13 6 * * *", "13 14 * * *"]'), github.event.schedule))
        || inputs.job == 'all' || inputs.job == 'settle_cards'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/settle_cards.py
