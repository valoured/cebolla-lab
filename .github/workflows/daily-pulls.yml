name: Cebolla — Daily Data Pulls

on:
  schedule:
    # Schedule pulls (3x daily)
    - cron: '0 6 * * *'      # 06:00 UTC — overnight prep
    - cron: '0 14 * * *'     # 14:00 UTC — mid-morning
    - cron: '0 22 * * *'     # 22:00 UTC — pre-game

    # DK odds pulls — hourly during slate window
    # MLB games run ~17:00 UTC (1PM ET day games) through ~05:00 UTC (1AM ET West Coast)
    - cron: '0 17 * * *'     # 17:00 UTC = 1PM ET
    - cron: '0 18 * * *'
    - cron: '0 19 * * *'
    - cron: '0 20 * * *'
    - cron: '0 21 * * *'
    - cron: '0 23 * * *'     # 22:00 already covered
    - cron: '0 0 * * *'      # 00:00 UTC = 8PM ET prime time
    - cron: '0 1 * * *'
    - cron: '0 2 * * *'
    - cron: '0 3 * * *'

  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'all'
        type: choice
        options: [all, schedule, savant, arsenals, weather, dk_odds]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ─────────────────────────────────────────────
  # 1. Schedule + probable pitchers (3x daily)
  # ─────────────────────────────────────────────
  pull-schedule:
    if: |
      (github.event_name == 'schedule' &&
       (github.event.schedule == '0 6 * * *' ||
        github.event.schedule == '0 14 * * *' ||
        github.event.schedule == '0 22 * * *'))
      || inputs.job == 'all' || inputs.job == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_schedule.py

  # ─────────────────────────────────────────────
  # 2. Savant / FanGraphs stats (twice daily)
  # ─────────────────────────────────────────────
  pull-savant:
    if: |
      (github.event_name == 'schedule' &&
       (github.event.schedule == '0 6 * * *' ||
        github.event.schedule == '0 22 * * *'))
      || inputs.job == 'all' || inputs.job == 'savant'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_savant.py

  # ─────────────────────────────────────────────
  # 3. Pitcher arsenals (once daily)
  # ─────────────────────────────────────────────
  pull-arsenals:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *')
      || inputs.job == 'all' || inputs.job == 'arsenals'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_arsenals.py

  # ─────────────────────────────────────────────
  # 4. Weather (3x daily with schedule)
  # ─────────────────────────────────────────────
  pull-weather:
    if: |
      (github.event_name == 'schedule' &&
       (github.event.schedule == '0 6 * * *' ||
        github.event.schedule == '0 14 * * *' ||
        github.event.schedule == '0 22 * * *'))
      || inputs.job == 'all' || inputs.job == 'weather'
    runs-on: ubuntu-latest
    needs: pull-schedule
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_weather.py

  # ─────────────────────────────────────────────
  # 5. DraftKings odds (hourly during slate)
  # ─────────────────────────────────────────────
  pull-dk-odds:
    if: |
      (github.event_name == 'schedule' &&
       contains(fromJSON('["0 17 * * *", "0 18 * * *", "0 19 * * *", "0 20 * * *", "0 21 * * *", "0 22 * * *", "0 23 * * *", "0 0 * * *", "0 1 * * *", "0 2 * * *", "0 3 * * *"]'), github.event.schedule))
      || inputs.job == 'all' || inputs.job == 'dk_odds'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r scripts/requirements.txt
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/pull_dk_odds.py
